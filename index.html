<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HexorOS — Agent OS</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
:root{
  --c:#00f2ff;--cd:rgba(0,242,255,.10);--cm:rgba(0,242,255,.28);
  --bg:#060a0f;--bg2:#0b1117;--bg3:#111820;--bg4:#16212e;
  --b:rgba(0,242,255,.13);--tx:#c8d8e8;--dim:#4a6070;
  --gr:#00ff88;--or:#ff8800;--rd:#ff3355;--pu:#9b59ff;--am:#ffaa00;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body,#root{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--tx);font-family:'Courier New','Consolas',monospace;}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.04) 2px,rgba(0,0,0,.04) 4px);pointer-events:none;z-index:9999;}
::-webkit-scrollbar{width:3px;height:3px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--cm);}
.app{display:flex;height:100vh;}
.sb{width:195px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--b);display:flex;flex-direction:column;overflow:hidden;}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.hdr{height:42px;background:var(--bg2);border-bottom:1px solid var(--b);display:flex;align-items:center;padding:0 16px;gap:10px;flex-shrink:0;}
.panel{flex:1;overflow-y:auto;padding:16px;}
.sb-logo{padding:12px 14px 10px;border-bottom:1px solid var(--b);}
.sb-t{font-size:11px;letter-spacing:.2em;font-weight:700;color:var(--c);text-shadow:0 0 8px rgba(0,242,255,.5);}
.sb-s{font-size:8px;letter-spacing:.15em;color:var(--dim);margin-top:1px;}
.sec-lbl{padding:8px 10px 3px;font-size:8px;letter-spacing:.18em;text-transform:uppercase;color:var(--dim);}
.nav{display:flex;align-items:center;gap:9px;padding:7px 14px;font-size:10px;letter-spacing:.06em;cursor:pointer;border-left:2px solid transparent;color:var(--dim);transition:all .12s;white-space:nowrap;}
.nav:hover{color:var(--tx);background:var(--bg3);}
.nav.on{border-left-color:var(--c);color:var(--c);background:var(--cd);}
.nav .dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.divider{height:1px;background:var(--b);margin:5px 0;}
.sb-bot{margin-top:auto;border-top:1px solid var(--b);padding:7px 10px;}
.sr{display:flex;align-items:center;gap:7px;padding:3px 4px;font-size:9px;color:var(--dim);}
.pdot{width:5px;height:5px;border-radius:50%;animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
.blink{animation:blink 1.2s step-end infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.fi{animation:fadeIn .25s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.spin{animation:spin .8s linear infinite;display:inline-block;}
.glow{text-shadow:0 0 8px var(--c),0 0 20px rgba(0,242,255,.3);}
.lbl{font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--dim);margin-bottom:8px;display:flex;align-items:center;gap:8px;}
.lbl::after{content:'';flex:1;height:1px;background:var(--b);}
.card{background:var(--bg2);border:1px solid var(--b);padding:14px;position:relative;overflow:hidden;transition:border-color .15s;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--c),transparent);opacity:.22;}
.card:hover{border-color:rgba(0,242,255,.25);}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.tag{display:inline-block;padding:2px 7px;font-size:9px;letter-spacing:.09em;text-transform:uppercase;border:1px solid;}
.tc{border-color:rgba(0,242,255,.3);color:var(--c);background:rgba(0,242,255,.06);}
.tg{border-color:rgba(0,255,136,.3);color:var(--gr);background:rgba(0,255,136,.06);}
.to{border-color:rgba(255,136,0,.3);color:var(--or);background:rgba(255,136,0,.06);}
.tp{border-color:rgba(155,89,255,.3);color:var(--pu);background:rgba(155,89,255,.06);}
.tr{border-color:rgba(255,51,85,.3);color:var(--rd);background:rgba(255,51,85,.06);}
.ta{border-color:rgba(255,170,0,.3);color:var(--am);background:rgba(255,170,0,.06);}
button{cursor:pointer;font-family:inherit;transition:all .14s;}
.btn{background:transparent;border:1px solid var(--c);color:var(--c);padding:6px 14px;font-size:10px;letter-spacing:.08em;text-transform:uppercase;}
.btn:hover{background:var(--cd);box-shadow:0 0 10px rgba(0,242,255,.2);}
.btn:disabled{opacity:.35;cursor:not-allowed;}
.bsm{background:transparent;border:1px solid var(--b);color:var(--dim);padding:3px 9px;font-size:10px;}
.bsm:hover{border-color:var(--c);color:var(--c);}
.bdng{background:transparent;border:1px solid var(--rd);color:var(--rd);padding:3px 8px;font-size:9px;}
.bdng:hover{background:rgba(255,51,85,.08);}
input,textarea,select{background:var(--bg3);border:1px solid var(--b);color:var(--tx);font-family:inherit;outline:none;transition:border-color .2s;}
input:focus,textarea:focus,select:focus{border-color:rgba(0,242,255,.45);box-shadow:0 0 8px rgba(0,242,255,.08);}
select option{background:var(--bg3);}
.progress{height:2px;background:var(--bg4);overflow:hidden;}
.pf{height:100%;background:var(--c);box-shadow:0 0 5px var(--c);transition:width .5s ease;}
.chat-w{display:flex;flex-direction:column;height:100%;}
.chat-m{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:12px;}
.mu{align-self:flex-end;max-width:75%;}
.ma{align-self:flex-start;max-width:80%;}
.bbl{padding:9px 13px;font-size:11px;line-height:1.65;white-space:pre-wrap;word-break:break-word;}
.mu .bbl{background:var(--cd);border:1px solid rgba(0,242,255,.18);}
.ma .bbl{background:var(--bg2);border:1px solid var(--b);}
.ml{font-size:9px;letter-spacing:.1em;color:var(--dim);margin-bottom:3px;text-transform:uppercase;}
.cir{padding:12px 14px;border-top:1px solid var(--b);display:flex;gap:8px;background:var(--bg2);}
.ci{flex:1;padding:8px 12px;font-size:12px;}
.td{display:inline-block;width:4px;height:4px;border-radius:50%;background:var(--c);margin:0 2px;animation:tdot 1.2s ease-in-out infinite;}
.td:nth-child(2){animation-delay:.2s}.td:nth-child(3){animation-delay:.4s}
@keyframes tdot{0%,80%,100%{transform:scale(.5);opacity:.4}40%{transform:scale(1);opacity:1}}
.kcol{background:var(--bg2);border:1px solid var(--b);padding:10px;}
.kct{font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--dim);margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid var(--b);}
.kcard{background:var(--bg3);border:1px solid var(--b);padding:8px 10px;margin-bottom:6px;cursor:pointer;transition:border-color .15s;}
.kcard:hover{border-color:rgba(0,242,255,.3);}
.vn{display:flex;align-items:center;gap:7px;padding:5px 10px;font-size:10px;cursor:pointer;transition:background .12s;}
.vn:hover{background:var(--bg3);}
.vn.sel{background:var(--cd);color:var(--c);}
.pil{background:var(--bg2);border:1px solid var(--b);padding:14px 16px;text-align:center;position:relative;overflow:hidden;}
.pil::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--c),transparent);opacity:.3;}
.pn{font-size:20px;font-weight:700;color:var(--c);text-shadow:0 0 12px rgba(0,242,255,.5);line-height:1;}
.pt{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--tx);margin:5px 0 2px;}
.ps{font-size:9px;color:var(--dim);}
.ac{background:var(--bg2);border:1px solid var(--b);padding:12px;display:flex;flex-direction:column;gap:7px;cursor:pointer;transition:border-color .15s;}
.an{font-size:12px;font-weight:700;letter-spacing:.1em;}
.ar{font-size:9px;color:var(--dim);letter-spacing:.07em;}
table{width:100%;border-collapse:collapse;}
th{padding:7px 10px;text-align:left;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);border-bottom:1px solid var(--b);background:var(--bg3);font-weight:normal;}
td{padding:8px 10px;font-size:11px;border-bottom:1px solid rgba(0,242,255,.05);vertical-align:middle;}
tr:hover td{background:var(--bg3);}
#graph-canvas{width:100%;height:100%;display:block;}
.graph-container{position:relative;background:var(--bg);border:1px solid var(--b);overflow:hidden;}
.graph-overlay{position:absolute;top:8px;left:10px;font-size:9px;color:var(--dim);pointer-events:none;letter-spacing:.1em;}
.graph-tabs{display:flex;gap:0;border-bottom:1px solid var(--b);}
.gtab{padding:7px 14px;font-size:9px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;color:var(--dim);border-bottom:2px solid transparent;transition:all .15s;}
.gtab:hover{color:var(--tx);}
.gtab.on{color:var(--c);border-bottom-color:var(--c);}
.memory-pill{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;background:var(--bg3);border:1px solid var(--b);font-size:9px;letter-spacing:.1em;color:var(--dim);margin-right:6px;}
.memory-pill span{color:var(--c);font-weight:700;}
.row{display:flex;align-items:center;gap:8px;}
.col{display:flex;flex-direction:column;gap:6px;}
.f1{flex:1;}
.mt{margin-top:12px;}
.mt2{margin-top:20px;}
/* Settings modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:flex;align-items:center;justify-content:center;}
.modal{background:var(--bg2);border:1px solid var(--b);padding:20px;min-width:420px;max-width:90vw;}
.modal-t{font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:var(--c);margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid var(--b);}
.field{display:flex;flex-direction:column;gap:4px;margin-bottom:12px;}
.field label{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);}
.field input,.field select,.field textarea{padding:7px 9px;font-size:11px;width:100%;}
/* NLM 2-col */
.nlm-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;height:calc(100vh - 80px);}
.nlm-col{display:flex;flex-direction:column;gap:8px;overflow:hidden;}
.nlm-hdr{background:var(--bg2);border:1px solid var(--b);padding:10px 12px;font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--dim);display:flex;align-items:center;gap:8px;flex-shrink:0;}
.src-item{display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--bg2);border:1px solid var(--b);margin-bottom:5px;font-size:10px;}
.img-thumb{width:100%;aspect-ratio:1;background:var(--bg3);border:1px solid var(--b);display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--dim);margin-bottom:6px;overflow:hidden;}
.img-thumb img{width:100%;height:100%;object-fit:cover;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback}=React;

// ── Default agent configs ─────────────────────────────────────────────────────
const AGENT_DEFAULTS=[
  {id:'claude',    lbl:'CLAUDE',      role:'Backend / Infra',  clr:'#00f2ff',
   provider:'claude', model:'claude-sonnet-4-6', host:'https://api.anthropic.com',
   workdir:'~/HexorosChaos/',
   ctx:'You are Claude, a helpful AI assistant by Anthropic. Be concise and precise.'},
  {id:'antigravity',lbl:'ANTIGRAVITY',role:'Frontend / Deploy', clr:'#9b59ff',
   provider:'ollama', model:'hexoros:latest', host:'https://api.hexoros.com',
   workdir:'/var/www/hexoros-chat/',
   ctx:'You are Antigravity, the HexorOS deploy and coding AI. Handle infrastructure, code, deployments. Concise. Anti-boundary: only write /var/www/. No nginx vhosts, no systemd from agents.'},
  {id:'hermes',    lbl:'HERMES',      role:'Codegen / Local',  clr:'#ff8800',
   provider:'ollama', model:'nemotron / deepseek / nvidia', host:'http://localhost:11434',
   workdir:'~/HexorosChaos/',
   ctx:'You are Hermes, local codegen agent for HexorOS. Execute CODEGEN_TASKS, write code, run scripts. Concise.'},
  {id:'custom',    lbl:'CUSTOM',      role:'Extensible',       clr:'#00ff88',
   provider:'ollama', model:'', host:'http://localhost:11434',
   workdir:'~/',
   ctx:'Custom agent. Edit settings to configure provider, model, host, and system prompt.'},
];

const SECTIONS=[
  {id:'dash',     lbl:'Dashboard',    ico:'⬡'},
  {id:'kanban',   lbl:'Kanban',       ico:'▦'},
  {id:'memory',   lbl:'Memory Vault', ico:'◈'},
  {id:'obsidian', lbl:'Obsidian',     ico:'◉'},
  {id:'notebook', lbl:'NotebookLM',   ico:'◫'},
  {id:'journal',  lbl:'Journal',      ico:'◌'},
  {id:'goals',    lbl:'Goals',        ico:'◎'},
];

// ── localStorage hook ─────────────────────────────────────────────────────────
function useLs(k,def){
  const[v,setV]=useState(()=>{try{const s=localStorage.getItem(k);return s?JSON.parse(s):def;}catch{return def;}});
  useEffect(()=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}},[k,v]);
  return[v,setV];
}

// ── Tag ───────────────────────────────────────────────────────────────────────
function Tag({t}){
  const m={high:'tr',med:'to',low:'tg',dev:'tc',content:'tp',infra:'to',agent:'ta',design:'tc',product:'tg',seo:'tc',sales:'tg',social:'tp',bug:'tr',fix:'tg',user:'tc',meta:'tp'};
  return<span className={`tag ${m[t]||'tc'}`}>{t}</span>;
}

// ── GEX44 Status ──────────────────────────────────────────────────────────────
function Status(){
  const[st,setSt]=useState('checking');
  useEffect(()=>{
    let alive=true;
    const chk=async()=>{
      try{const r=await fetch('https://api.hexoros.com/api/health',{signal:AbortSignal.timeout(8000)});const d=await r.json();if(alive)setSt(d.status==='ok'&&d.ollama==='connected'?'ok':'warn');}
      catch{if(alive)setSt('err');}
    };
    chk();const iv=setInterval(chk,60000);return()=>{alive=false;clearInterval(iv);};
  },[]);
  const clr={ok:'#00ff88',warn:'#ffaa00',err:'#ff3355',checking:'#5a7080'};
  const lbl={ok:'Online',warn:'Degraded',err:'Offline',checking:'...'};
  return(
    <div className="sr">
      <div className="pdot" style={{background:clr[st],boxShadow:`0 0 5px ${clr[st]}`}}/>
      <span style={{color:clr[st],fontSize:9}}>{lbl[st]}</span>
      <span style={{color:'var(--dim)',fontSize:9,marginLeft:2}}>GEX44</span>
    </div>
  );
}

// ── Knowledge Graph ───────────────────────────────────────────────────────────
function KnowledgeGraph({nodes,onSelect,selected}){
  const canvasRef=useRef(null);
  const simRef=useRef({nodes:[],links:[],running:true,raf:null});
  useEffect(()=>{
    const canvas=canvasRef.current;if(!canvas)return;
    const ctx=canvas.getContext('2d');
    const W=canvas.parentElement.offsetWidth,H=canvas.parentElement.offsetHeight-1;
    canvas.width=W;canvas.height=H;
    const sim=simRef.current;
    sim.nodes=nodes.map(n=>({...n,x:W/2+(Math.random()-.5)*W*.6,y:H/2+(Math.random()-.5)*H*.6,vx:0,vy:0,r:n.root?10:6}));
    const links=[];
    sim.nodes.forEach(a=>{(a.tags||[]).forEach(t=>{const b=sim.nodes.find(n=>n.id===t||n.title===t);if(b&&a.id!==b.id)links.push({a,b});});});
    const byType={};sim.nodes.forEach(n=>{const k=n.type||'misc';(byType[k]=byType[k]||[]).push(n);});
    Object.values(byType).forEach(g=>{for(let i=0;i<Math.min(g.length-1,3);i++)links.push({a:g[i],b:g[i+1],soft:true});});
    sim.links=links;
    const tc={user:'#00f2ff',infra:'#ff8800',design:'#9b59ff',product:'#00ff88',bug:'#ff3355',fix:'#00d084',meta:'#5a7080',note:'#7c5aff',misc:'#4a6070'};
    const tick=()=>{
      if(!sim.running)return;
      sim.nodes.forEach(n=>{n.vx+=(W/2-n.x)*.003;n.vy+=(H/2-n.y)*.003;});
      for(let i=0;i<sim.nodes.length;i++)for(let j=i+1;j<sim.nodes.length;j++){
        const a=sim.nodes[i],b=sim.nodes[j],dx=b.x-a.x,dy=b.y-a.y,d=Math.sqrt(dx*dx+dy*dy)||1,f=Math.min(1200/(d*d),2);
        a.vx-=dx/d*f;a.vy-=dy/d*f;b.vx+=dx/d*f;b.vy+=dy/d*f;
      }
      sim.links.forEach(({a,b,soft})=>{const dx=b.x-a.x,dy=b.y-a.y,d=Math.sqrt(dx*dx+dy*dy)||1,t=soft?80:50,f=(d-t)/d*.05*(soft?.3:.8);a.vx+=dx*f;a.vy+=dy*f;b.vx-=dx*f;b.vy-=dy*f;});
      sim.nodes.forEach(n=>{n.vx*=.88;n.vy*=.88;n.x=Math.max(n.r+5,Math.min(W-n.r-5,n.x+n.vx));n.y=Math.max(n.r+5,Math.min(H-n.r-5,n.y+n.vy));});
      ctx.clearRect(0,0,W,H);
      sim.links.forEach(({a,b,soft})=>{ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.strokeStyle=soft?'rgba(0,242,255,0.07)':'rgba(0,242,255,0.14)';ctx.lineWidth=soft?.5:.8;ctx.stroke();});
      sim.nodes.forEach(n=>{
        const clr=tc[n.type]||tc.misc,isSel=selected&&selected.id===n.id;
        if(isSel||n.root){const g=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r*3);g.addColorStop(0,clr+(isSel?'40':'25'));g.addColorStop(1,'transparent');ctx.beginPath();ctx.arc(n.x,n.y,n.r*3,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();}
        ctx.beginPath();ctx.arc(n.x,n.y,n.r,0,Math.PI*2);ctx.fillStyle=isSel?clr:clr+'55';ctx.fill();ctx.strokeStyle=isSel?clr:clr+'99';ctx.lineWidth=isSel?1.5:.8;ctx.stroke();
        if(n.r>=5||isSel){ctx.fillStyle=isSel?'#fff':clr+'cc';ctx.font=`${isSel?10:8}px Courier New`;ctx.textAlign='center';ctx.fillText(n.title?(n.title.length>18?n.title.slice(0,16)+'…':n.title):'',n.x,n.y+n.r+10);}
      });
      sim.raf=requestAnimationFrame(tick);
    };
    tick();
    const onClick=e=>{const r=canvas.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top,hit=sim.nodes.find(n=>Math.hypot(n.x-mx,n.y-my)<n.r+8);if(hit&&onSelect)onSelect(hit);};
    canvas.addEventListener('click',onClick);
    return()=>{sim.running=false;if(sim.raf)cancelAnimationFrame(sim.raf);canvas.removeEventListener('click',onClick);};
  },[nodes]);
  return<canvas ref={canvasRef} id="graph-canvas"/>;
}

// ── Agent Settings Modal ──────────────────────────────────────────────────────
function AgentSettings({agent,onSave,onClose}){
  const[cfg,setCfg]=useState({...agent});
  const CLAUDE_MODELS=['claude-opus-4-6','claude-sonnet-4-6','claude-haiku-4-5-20251001'];
  const OLLAMA_MODELS=['qwen3:27b','hexoros:latest','llama3.2:latest','gemma3:latest','mistral:latest'];
  const update=k=>e=>setCfg(c=>({...c,[k]:e.target.value}));
  return(
    <div className="overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-t">⚙ {cfg.lbl} — Settings</div>
        <div className="field"><label>Name</label><input value={cfg.lbl} onChange={update('lbl')}/></div>
        <div className="field"><label>Role</label><input value={cfg.role} onChange={update('role')}/></div>
        <div className="field">
          <label>Provider</label>
          <select value={cfg.provider} onChange={update('provider')}>
            <option value="ollama">Ollama / Compatible</option>
            <option value="claude">Claude API</option>
            <option value="custom">Custom OpenAI-compat</option>
          </select>
        </div>
        <div className="field">
          <label>Host / Base URL</label>
          <input value={cfg.host} onChange={update('host')} placeholder="https://api.hexoros.com or http://localhost:11434"/>
        </div>
        <div className="field">
          <label>Model</label>
          <input value={cfg.model} onChange={update('model')} list={`mdl-${cfg.id}`} placeholder="qwen3:27b / claude-sonnet-4-6"/>
          <datalist id={`mdl-${cfg.id}`}>
            {(cfg.provider==='claude'?CLAUDE_MODELS:OLLAMA_MODELS).map(m=><option key={m} value={m}/>)}
          </datalist>
        </div>
        {cfg.provider==='claude'&&(
          <div className="field"><label>API Key</label><input type="password" value={cfg.apiKey||''} onChange={update('apiKey')} placeholder="sk-ant-..."/></div>
        )}
        <div className="field"><label>System Prompt</label><textarea rows={4} style={{resize:'vertical'}} value={cfg.ctx} onChange={update('ctx')}/></div>

// ── Agent Chat ────────────────────────────────────────────────────────────────
function AgentChat({agent,onUpdateAgent}){
  const[msgs,setMsgs]=useLs(`hx_chat_${agent.id}`,[{role:'ai',text:`${agent.lbl} online. ${agent.role}.`}]);
  const[inp,setInp]=useState('');
  const[loading,setLoading]=useState(false);
  const[showSettings,setShowSettings]=useState(false);
  const endRef=useRef(null);
  useEffect(()=>endRef.current?.scrollIntoView({behavior:'smooth'}),[msgs]);

  const send=async()=>{
    const txt=inp.trim();if(!txt||loading)return;
    setMsgs(m=>[...m,{role:'user',text:txt}]);setInp('');setLoading(true);
    const aiId=Date.now();
    setMsgs(m=>[...m,{role:'ai',text:'',id:aiId}]);
    try{
      let full='';
      if(agent.provider==='claude'){
        // Claude API streaming
        const res=await fetch(`${agent.host||'https://api.anthropic.com'}/v1/messages`,{
          method:'POST',
          headers:{'Content-Type':'application/json','x-api-key':agent.apiKey||'','anthropic-version':'2023-06-01','anthropic-beta':'messages-2023-12-15'},
          body:JSON.stringify({model:agent.model||'claude-sonnet-4-6',max_tokens:2048,system:agent.ctx,stream:true,messages:[{role:'user',content:txt}]})
        });
        if(!res.ok)throw new Error(`Claude API ${res.status}`);
        const reader=res.body.getReader();const dec=new TextDecoder();
        while(true){
          const{done,value}=await reader.read();if(done)break;
          for(const line of dec.decode(value).split('\n')){
            if(!line.startsWith('data:'))continue;
            const data=line.slice(5).trim();if(data==='[DONE]')continue;
            try{const d=JSON.parse(data);if(d.type==='content_block_delta'&&d.delta?.text){full+=d.delta.text;setMsgs(m=>m.map(x=>x.id===aiId?{...x,text:full}:x));}}catch{}
          }
        }
      } else {
        // Ollama NDJSON streaming
        const host=agent.host||'https://api.hexoros.com';
        const endpoint=host.includes('api.hexoros.com')?`${host}/api/chat`:`${host}/api/chat`;
        const tok=localStorage.getItem('hexoros_token');
        const hdrs={'Content-Type':'application/json'};
        if(tok&&host.includes('hexoros'))hdrs['Authorization']=`Bearer ${tok}`;
        const res=await fetch(endpoint,{method:'POST',headers:hdrs,body:JSON.stringify({message:txt,context:agent.ctx,agent:agent.id,model:agent.model||'qwen3:27b'})});
        if(!res.ok)throw new Error(res.status);
        const reader=res.body.getReader();const dec=new TextDecoder();
        while(true){
          const{done,value}=await reader.read();if(done)break;
          for(const line of dec.decode(value).split('\n')){
            if(!line.trim())continue;
            try{const d=JSON.parse(line);const tok=d.message?.content||d.response||d.content;if(tok){full+=tok;setMsgs(m=>m.map(x=>x.id===aiId?{...x,text:full}:x));}}catch{}
          }
        }
      }
      if(!full)setMsgs(m=>m.map(x=>x.id===aiId?{...x,text:'[no response]'}:x));
    }catch(e){setMsgs(m=>m.map(x=>x.id===aiId?{...x,text:`Error: ${e.message}`}:x));}
    finally{setLoading(false);}
  };

  const providerLabel={claude:'Claude API',ollama:'Ollama',custom:'Custom'}[agent.provider]||agent.provider;

  return(
    <>
    {showSettings&&<AgentSettings agent={agent} onSave={cfg=>{onUpdateAgent(cfg);setShowSettings(false);}} onClose={()=>setShowSettings(false)}/>}
    <div className="chat-w" style={{height:'calc(100vh - 42px)'}}>
      <div style={{padding:'8px 16px',background:'var(--bg2)',borderBottom:'1px solid var(--b)',display:'flex',alignItems:'center',gap:10,flexShrink:0}}>
        <div style={{width:7,height:7,borderRadius:'50%',background:agent.clr,boxShadow:`0 0 6px ${agent.clr}`}}/>
        <span style={{fontSize:12,fontWeight:700,letterSpacing:'.12em',color:agent.clr}}>{agent.lbl}</span>
        <span style={{fontSize:9,color:'var(--dim)'}}>{agent.role}</span>
        <span style={{marginLeft:'auto',fontSize:9,color:'var(--dim)',fontFamily:'monospace'}}>{providerLabel} · {agent.model}</span>
        <button className="bsm" onClick={()=>setShowSettings(true)} title="Settings">⚙</button>
        <button className="bsm" onClick={()=>setMsgs([{role:'ai',text:`${agent.lbl} reset.`}])}>clear</button>
      </div>
      <div className="chat-m">
        {msgs.map((m,i)=>(
          <div key={i} className={m.role==='user'?'mu':'ma'}>
            <div className="ml">{m.role==='user'?'YOU':agent.lbl}</div>
            <div className="bbl">{m.text||(m.role==='ai'&&loading&&i===msgs.length-1?<span><span className="td"/><span className="td"/><span className="td"/></span>:'…')}</div>
          </div>
        ))}
        <div ref={endRef}/>
      </div>
      <div className="cir">
        <input className="ci" value={inp} onChange={e=>setInp(e.target.value)} onKeyDown={e=>e.key==='Enter'&&!e.shiftKey&&send()} placeholder={`Message ${agent.lbl}...`} disabled={loading}/>
        <button className="btn" onClick={send} disabled={loading||!inp.trim()}>{loading?<span className="spin">⟳</span>:'→'}</button>
      </div>
    </div>
    </>
  );
}

      if(res.ok){const d=await res.json();setGenStatus(`Queued: ${d.prompt_id||'...'}`);setImages(imgs=>[{id:Date.now(),prompt:fullPrompt,status:'generating',pid:d.prompt_id},...imgs.slice(0,11)]);}

    }catch(e){setGenStatus(`Error: ${e.message} — Is ComfyUI running at ${COMFY_HOST}?`);}
  };
  return(
    <div className="nlm-grid fi">
      {/* LEFT — Sources */}
      <div className="nlm-col">
        <div className="nlm-hdr">
          <span>◫ Sources</span>
          <span className="memory-pill" style={{marginLeft:'auto'}}><span>{sources.length}</span> docs</span>
          <button className="bsm" onClick={exportNLM} title="Export all as .txt for NotebookLM">↓ export</button>
          <button className="bsm" onClick={()=>setAdding(!adding)}>+</button>
        </div>
        {adding&&(
          <div className="card" style={{flexShrink:0}}>
            <input style={{width:'100%',padding:'6px 9px',fontSize:11,marginBottom:6}} value={newTitle} onChange={e=>setNewTitle(e.target.value)} placeholder="Source title..."/>
            <textarea rows={3} style={{width:'100%',padding:'6px 9px',fontSize:10,resize:'vertical',marginBottom:6}} value={newContent} onChange={e=>setNewContent(e.target.value)} placeholder="Content / paste text..."/>
            <div style={{display:'flex',gap:6}}>
              <button className="btn" onClick={addSource}>add</button>
              <button className="bsm" onClick={()=>setAdding(false)}>cancel</button>
            </div>
          </div>
        )}
        <div style={{flex:1,overflowY:'auto'}}>
          {sources.map(s=>(
            <div key={s.id} className="src-item">
              <span style={{fontSize:8,color:'var(--c)',letterSpacing:'.1em',textTransform:'uppercase',minWidth:36}}>{s.type}</span>
              <span style={{flex:1,fontSize:11,fontWeight:700}}>{s.title}</span>
              <span style={{fontSize:9,color:'var(--dim)',flex:2,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{s.content.slice(0,60)}…</span>
              <button className="bdng" style={{padding:'1px 4px',fontSize:8,marginLeft:6}} onClick={()=>delSource(s.id)}>✕</button>
            </div>
          ))}
        </div>
        <div style={{padding:'8px',background:'var(--bg2)',border:'1px solid var(--b)',fontSize:9,color:'var(--dim)',flexShrink:0}}>
          <div style={{marginBottom:4}}>↓ Export → import into NotebookLM as "Text source"</div>
          <input style={{width:'100%',padding:'4px 7px',fontSize:9}} defaultValue={localStorage.getItem('nlm_folder')||''} onBlur={e=>localStorage.setItem('nlm_folder',e.target.value)} placeholder="Watch folder path (optional)"/>
        </div>
      </div>
      {/* RIGHT — Media Generation */}
      <div className="nlm-col">
        <div className="nlm-hdr">
          <span>⬡ Media Generation</span>
          <span style={{marginLeft:'auto',fontSize:9,color:'var(--dim)'}}>ComfyUI</span>
          <input style={{padding:'2px 6px',fontSize:9,width:160}} defaultValue={COMFY_HOST} onBlur={e=>localStorage.setItem('comfy_host',e.target.value)} title="ComfyUI host"/>
        </div>
        <div style={{background:'var(--bg2)',border:'1px solid var(--b)',padding:12,flexShrink:0}}>
          <div style={{marginBottom:8}}>
            <div style={{fontSize:9,letterSpacing:'.12em',textTransform:'uppercase',color:'var(--dim)',marginBottom:4}}>Prompt</div>
            <textarea rows={3} style={{width:'100%',padding:'7px 9px',fontSize:11,resize:'none'}} value={prompt} onChange={e=>setPrompt(e.target.value)} placeholder="cyberpunk AI control room, hexoros logo, neon cyan..."/>
          </div>
          <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:8}}>
            <select style={{flex:1,padding:'6px 7px',fontSize:10}} value={style} onChange={e=>setStyle(e.target.value)}>
              {STYLES.map(s=><option key={s}>{s}</option>)}
            </select>
            <button className="btn" onClick={generate} disabled={!prompt.trim()}>generate →</button>
          </div>
          {genStatus&&<div style={{fontSize:9,color:'var(--or)',padding:'4px 0'}}>{genStatus}</div>}
        </div>
        <div style={{flex:1,overflowY:'auto',padding:8}}>
          {images.length===0&&(
            <div style={{textAlign:'center',padding:40,color:'var(--dim)',fontSize:11}}>
              <div style={{fontSize:20,marginBottom:8,opacity:.3}}>⬡</div>
              <div>No images yet.</div>
              <div style={{fontSize:9,marginTop:4}}>ComfyUI must run at localhost:8188</div>
              <div style={{fontSize:9,marginTop:2}}>or update host above ↑</div>
            </div>
          )}
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
            {images.map(img=>(
              <div key={img.id}>
                <div className="img-thumb">
                  {img.url?<img src={img.url} alt=""/>:<div style={{textAlign:'center',padding:20}}><div className={img.status==='generating'?'spin':''}>{img.status==='generating'?'⟳':'⬡'}</div><div style={{marginTop:4,fontSize:8}}>{img.status}</div></div>}
                </div>
                <div style={{fontSize:8,color:'var(--dim)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{img.prompt}</div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

// ── Goals ─────────────────────────────────────────────────────────────────────
const GOALS_DEF=[
  {id:'g1',t:'Launch hexoros.com mainstore by June 1',pct:55,tag:'product'},
  {id:'g2',t:'First 3 Complete-tier clients (€2.497)',pct:15,tag:'sales'},
  {id:'g3',t:'Publish 30 SEO articles DE/EN/ES',pct:40,tag:'seo'},
  {id:'g4',t:'Dograh Voice OS fully operational',pct:60,tag:'product'},
  {id:'g5',t:'Social media — 1k followers Instagram',pct:20,tag:'social'},
];
function Goals(){
  const[goals,setGoals]=useLs('hx_goals',GOALS_DEF);
  const[adding,setAdding]=useState(false);
  const[nw,setNw]=useState({t:'',pct:0,tag:'product'});
  const tclr={product:'#00ff88',sales:'#ffaa00',seo:'#00f2ff',social:'#9b59ff',infra:'#ff8800'};
  const upd=(id,pct)=>setGoals(gs=>gs.map(g=>g.id===id?{...g,pct:Math.min(100,Math.max(0,pct))}:g));
  const del=id=>setGoals(gs=>gs.filter(g=>g.id!==id));
  const add=()=>{if(!nw.t.trim())return;setGoals(gs=>[...gs,{id:'g'+Date.now(),...nw}]);setNw({t:'',pct:0,tag:'product'});setAdding(false);};
  return(
    <div className="fi">
      <div style={{display:'flex',gap:8,marginBottom:12,alignItems:'center'}}>
        <span style={{fontSize:10,color:'var(--dim)',letterSpacing:'.1em',textTransform:'uppercase'}}>Mission Goals</span>
        <button className="bsm" onClick={()=>setAdding(!adding)}>+ add</button>
      </div>
      {adding&&<div className="card" style={{marginBottom:12,display:'flex',gap:7,alignItems:'center',flexWrap:'wrap'}}>
        <input style={{flex:'1 1 200px',padding:'6px 9px',fontSize:11}} value={nw.t} onChange={e=>setNw(v=>({...v,t:e.target.value}))} onKeyDown={e=>e.key==='Enter'&&add()} placeholder="Goal..."/>
        <select style={{padding:'6px 7px',fontSize:10}} value={nw.tag} onChange={e=>setNw(v=>({...v,tag:e.target.value}))}>{['product','sales','seo','social','infra'].map(t=><option key={t}>{t}</option>)}</select>
        <button className="btn" onClick={add}>add</button>
      </div>}
      <div style={{display:'flex',flexDirection:'column',gap:10}}>
        {goals.map(g=>(
          <div key={g.id} className="card">
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
              <span style={{fontSize:11,flex:1}}>{g.t}</span>
              <Tag t={g.tag}/><span style={{fontSize:11,color:tclr[g.tag]||'var(--c)',minWidth:28,textAlign:'right'}}>{g.pct}%</span>
              <button className="bdng" onClick={()=>del(g.id)}>✕</button>
            </div>
            <div className="progress"><div className="pf" style={{width:`${g.pct}%`,background:tclr[g.tag]||'var(--c)',boxShadow:`0 0 5px ${tclr[g.tag]||'var(--c)'}`}}/></div>
            <div style={{display:'flex',gap:5,marginTop:7}}>
              {[0,25,50,75,100].map(p=><button key={p} className="bsm" style={{padding:'2px 6px',fontSize:9,...(g.pct===p?{borderColor:'var(--c)',color:'var(--c)'}:{})}} onClick={()=>upd(g.id,p)}>{p}%</button>)}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── Journal ───────────────────────────────────────────────────────────────────
const JOURNAL_DEF=[
  {date:'2026-05-22',title:'Agent OS v3 + MCP stack',body:'4 agents: Claude/Antigravity/Hermes/Custom. Provider switcher per agent. NotebookLM 2-col workspace + ComfyUI media gen. MCP: internal + customer + brain + vps all configured.'},
  {date:'2026-05-22',title:'Engine rename + Pricing',body:'Engine → HexorOS Core/Complete/Enterprise. Core sale optic ~~€1.490~~ €990. Complete €2.497. Enterprise €9.997 Coming Soon.'},
  {date:'2026-05-22',title:'Chat fix',body:'hexoros:latest model broken. JWT user_id int. chunk.message.content. Health = real inference test. All fixed.'},
];
function Journal(){
  const[entries,setEntries]=useLs('hx_journal',JOURNAL_DEF);
  const[sel,setSel]=useState(0);
  const[body,setBody]=useState(entries[0]?.body||'');
  useEffect(()=>setBody(entries[sel]?.body||''),[sel]);
  const save=()=>setEntries(es=>es.map((e,i)=>i===sel?{...e,body}:e));
  const add=()=>{const today=new Date().toISOString().slice(0,10);setEntries(es=>[{date:today,title:'New Entry',body:''},...es]);setSel(0);};
  return(
    <div className="fi" style={{display:'grid',gridTemplateColumns:'200px 1fr',gap:12,height:'calc(100vh - 80px)'}}>
      <div style={{background:'var(--bg2)',border:'1px solid var(--b)',overflow:'auto'}}>
        <div style={{padding:'10px',borderBottom:'1px solid var(--b)',display:'flex',gap:5,alignItems:'center'}}>
          <span style={{fontSize:9,letterSpacing:'.15em',textTransform:'uppercase',color:'var(--dim)',flex:1}}>Entries</span>
          <button className="bsm" onClick={add}>+</button>
        </div>
        {entries.map((e,i)=><div key={i} className={`vn ${sel===i?'sel':''}`} onClick={()=>setSel(i)}><div><div style={{fontSize:9,color:'var(--c)'}}>{e.date}</div><div style={{fontSize:10,marginTop:1}}>{e.title}</div></div></div>)}
      </div>
      <div style={{background:'var(--bg2)',border:'1px solid var(--b)',display:'flex',flexDirection:'column'}}>
        {entries[sel]&&<><div style={{padding:'10px 14px',borderBottom:'1px solid var(--b)',display:'flex',alignItems:'center',gap:8}}><span style={{color:'var(--c)',fontSize:10}}>{entries[sel].date}</span><span style={{fontSize:12,fontWeight:700}}>{entries[sel].title}</span><button className="btn" style={{marginLeft:'auto'}} onClick={save}>save</button></div>
        <textarea style={{flex:1,padding:16,fontSize:12,lineHeight:1.9,resize:'none',border:'none',outline:'none',background:'var(--bg2)',color:'var(--tx)'}} value={body} onChange={e=>setBody(e.target.value)}/></>}
      </div>
    </div>
  );
}

// ── Memory Vault ──────────────────────────────────────────────────────────────
const MEM_DEF=[
  {id:'m1',title:'Dennis',         type:'user',   body:'Founder HexorOS. El Salvador. LATAM/USA/ES/DACH/UK. Caveman mode.'},
  {id:'m2',title:'GEX44',          type:'infra',  body:'api.hexoros.com · qwen3:27b + hexoros:latest · ollama_proxy  · MCP brain :8767'},
  {id:'m3',title:'KVM4',           type:'infra',  body:'hexoros.com · hexoros.com · MCP vps :8765'},
  {id:'m4',title:'Brand',          type:'design', body:'#00f2ff cyan · #060a0f bg · NO gold · "Your Private AI Workforce"'},
  {id:'m5',title:'Pricing',        type:'product',body:'Core ~~€1.490~~ €990+€99/mo · Complete €2.497+€149/mo · Enterprise €9.997'},
  {id:'m6',title:'Anti-boundary',  type:'meta',   body:'Agents ONLY write /var/www/. No nginx vhosts, no systemd.'},
];
function MemoryPanel(){
  const[entries,setEntries]=useLs('hx_mem',MEM_DEF);
  const[sel,setSel]=useState(null);
  const[ek,setEk]=useState('');const[eb,setEb]=useState('');const[et,setEt]=useState('meta');
  const[filter,setFilter]=useState('');
  const filtered=entries.filter(e=>!filter||e.title.toLowerCase().includes(filter)||e.body.toLowerCase().includes(filter));
  const pick=e=>{setSel(e);setEk(e.title);setEb(e.body);setEt(e.type);};
  const save=()=>setEntries(es=>es.map(e=>e.id===sel.id?{...e,title:ek,body:eb,type:et}:e));
  const add=()=>{const e={id:'m'+Date.now(),title:'New',type:'meta',body:''};setEntries(es=>[e,...es]);pick(e);};
  const del=id=>{setEntries(es=>es.filter(e=>e.id!==id));if(sel?.id===id)setSel(null);};
  const tc={user:'#00f2ff',infra:'#ff8800',design:'#9b59ff',product:'#00ff88',bug:'#ff3355',fix:'#00d084',meta:'#5a7080'};
  return(
    <div className="fi" style={{display:'grid',gridTemplateColumns:'220px 1fr',gap:12,height:'calc(100vh - 80px)'}}>
      <div style={{background:'var(--bg2)',border:'1px solid var(--b)',overflow:'auto'}}>
        <div style={{padding:'10px',borderBottom:'1px solid var(--b)',display:'flex',gap:5}}>
          <input style={{flex:1,padding:'5px 7px',fontSize:10}} placeholder="search..." value={filter} onChange={e=>setFilter(e.target.value)}/>
          <button className="bsm" onClick={add}>+</button>
        </div>
        {filtered.map(e=><div key={e.id} className={`vn ${sel?.id===e.id?'sel':''}`} onClick={()=>pick(e)}>
          <span style={{width:5,height:5,borderRadius:'50%',background:tc[e.type]||'#5a7080',display:'inline-block',flexShrink:0}}/>
          <span style={{flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontSize:10}}>{e.title}</span>
          <button className="bdng" style={{padding:'1px 4px',fontSize:8}} onClick={ev=>{ev.stopPropagation();del(e.id);}}>✕</button>
        </div>)}
      </div>
      <div style={{background:'var(--bg2)',border:'1px solid var(--b)',display:'flex',flexDirection:'column'}}>
        {sel?(<>
          <div style={{padding:'10px 12px',borderBottom:'1px solid var(--b)',display:'flex',gap:7,alignItems:'center'}}>
            <input style={{flex:1,padding:'4px 7px',fontSize:11,fontWeight:700}} value={ek} onChange={e=>setEk(e.target.value)}/>
            <select style={{padding:'4px 6px',fontSize:10}} value={et} onChange={e=>setEt(e.target.value)}>{Object.keys(tc).map(t=><option key={t}>{t}</option>)}</select>
            <button className="btn" onClick={save}>save</button>
          </div>
          <textarea style={{flex:1,padding:14,fontSize:12,lineHeight:1.8,resize:'none',border:'none',outline:'none',background:'var(--bg2)',color:'var(--tx)'}} value={eb} onChange={e=>setEb(e.target.value)}/>
        </>):<div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',color:'var(--dim)',fontSize:11}}>select a memory entry</div>}
      </div>
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────────────
function App(){
  const[agents,setAgents]=useLs('hx_agents',AGENT_DEFAULTS);
  const[section,setSection]=useState('dash');
  const[agent,setAgent]=useState(null);
  const openAgent=id=>{const a=agents.find(x=>x.id===id);if(a)setAgent(a);};
  const updateAgent=cfg=>{setAgents(as=>as.map(a=>a.id===cfg.id?cfg:a));setAgent(cfg);};
  const goSection=id=>{setSection(id);setAgent(null);};
  const panel=()=>{
    if(agent)return<AgentChat agent={agent} onUpdateAgent={updateAgent}/>;
    switch(section){
      case'dash':     return<div className="panel"><Dashboard agents={agents} onAgent={openAgent}/></div>;
      case'kanban':   return<div className="panel"><Kanban/></div>;
      case'memory':   return<div className="panel"><MemoryPanel/></div>;
      case'obsidian': return<div className="panel"><ObsidianPanel/></div>;
      case'notebook': return<div className="panel"><NotebookPanel/></div>;
      case'journal':  return<div className="panel"><Journal/></div>;
      case'goals':    return<div className="panel"><Goals/></div>;
      default:        return null;
    }
  };
  return(
    <div className="app">
      <div className="sb">
        <div className="sb-logo"><div className="sb-t glow">HEXOROS</div><div className="sb-s">AGENT OS · INTERNAL</div></div>
        <div style={{overflowY:'auto',flex:1}}>
          <div className="sec-lbl">Workspace</div>
          {SECTIONS.map(s=><div key={s.id} className={`nav ${!agent&&section===s.id?'on':''}`} onClick={()=>goSection(s.id)}><span style={{opacity:.6,fontSize:11}}>{s.ico}</span><span>{s.lbl}</span></div>)}
          <div className="divider"/>
          <div className="sec-lbl">Agents</div>
          {agents.map(a=><div key={a.id} className={`nav ${agent?.id===a.id?'on':''}`} onClick={()=>openAgent(a.id)}>
            <div className="dot pdot" style={{background:a.clr,boxShadow:`0 0 4px ${a.clr}`,flexShrink:0}}/>
            <span style={{flex:1}}>{a.lbl}</span>
            <span style={{fontSize:8,color:'var(--dim)'}}>{a.provider==='claude'?'API':'Ollama'}</span>
          </div>)}
        </div>
        <div className="sb-bot"><Status/><div className="sr" style={{fontSize:8,color:'var(--dim)'}}>qwen3:27b · hexoros:latest · GEX44</div></div>
      </div>
      <div className="main">
        <div className="hdr">
          {agent?(
            <>
              <div style={{width:7,height:7,borderRadius:'50%',background:agent.clr,boxShadow:`0 0 7px ${agent.clr}`}}/>
              <span style={{fontSize:11,fontWeight:700,letterSpacing:'.12em',color:agent.clr}}>{agent.lbl}</span>
              <span style={{fontSize:9,color:'var(--dim)'}}>{agent.role}</span>
              <button className="bsm" style={{marginLeft:'auto'}} onClick={()=>setAgent(null)}>← back</button>
            </>
          ):(
            <>
              <span style={{fontSize:10,letterSpacing:'.15em',textTransform:'uppercase',color:'var(--c)'}}>{SECTIONS.find(s=>s.id===section)?.lbl}</span>
              <span style={{marginLeft:'auto',fontSize:9,color:'var(--dim)',fontFamily:'monospace'}}>
                <span className="blink" style={{color:'var(--c)'}}>▊</span> hexoros://agent-os/internal
              </span>
            </>
          )}
        </div>
        <div style={{flex:1,overflow:'hidden'}}>{panel()}</div>
      </div>
    </div>
  );
}

ReactDOM.render(<App/>,document.getElementById('root'));
</script></body></html>
